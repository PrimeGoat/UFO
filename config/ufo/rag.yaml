# RAG (Retrieval Augmented Generation) Configuration

# Offline Documentation RAG
RAG_OFFLINE_DOCS: True  # Enabled — gracefully skips with warning if no app FAISS indices exist yet
                          # When ready: index app docs once, then enable permanently
RAG_OFFLINE_DOCS_RETRIEVED_TOPK: 3  # Raised from 1: more doc chunks = more context

# Online Search RAG
BING_API_KEY: "a5f1dec156334648a2354fabb221ffff"
RAG_ONLINE_SEARCH: True  # Enable: Bing search per step for unfamiliar apps/tasks
                          # Runs reactively during message construction, not just "when stuck"
                          # Cost: ~1-2s latency per step + API calls. Worth it for reliability.
RAG_ONLINE_SEARCH_TOPK: 5  # Fine — 5 search results considered
RAG_ONLINE_RETRIEVED_TOPK: 2  # Raised from 1: inject 2 search result chunks per step

# Experience RAG
RAG_EXPERIENCE: True  # Enabled — retrieves past task trajectories as few-shot examples
RAG_EXPERIENCE_RETRIEVED_TOPK: 5  # Fine — 5 most similar past experiences
EXPERIENCE_SAVED_PATH: "vectordb/experience/"

# Demonstration RAG
RAG_DEMONSTRATION: True  # Enabled — gracefully skips with warning if vectordb/demonstration/ is empty
                           # How: record yourself doing tasks via Windows Steps Recorder,
                           # run UFO's processing script to index the ZIP into vectordb/demonstration/
                           # Then flip to True — it injects your recorded workflow as few-shot examples
RAG_DEMONSTRATION_RETRIEVED_TOPK: 5
RAG_DEMONSTRATION_COMPLETION_N: 3
DEMONSTRATION_SAVED_PATH: "vectordb/demonstration/"

# Prompts for RAG
EXPERIENCE_PROMPT: "ufo/prompts/experience/experience_summary.yaml"
DEMONSTRATION_PROMPT: "ufo/prompts/demonstration/demonstration_summary.yaml"
